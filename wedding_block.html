
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@300;400;500&display=swap');
  .wi{min-height:600px;background:#f0ebe4;display:flex;align-items:center;justify-content:center;padding:60px 20px;position:relative;}
  .wi__card{width:100%;max-width:420px;background:rgba(255,252,248,0.72);backdrop-filter:blur(10px);border-radius:4px;padding:50px 40px;display:flex;flex-direction:column;align-items:center;gap:0;text-align:center;border:0.5px solid rgba(180,160,130,0.3);}
  .wi__ornament{width:100%;max-width:280px;height:60px;margin-bottom:28px;}
  .wi__photo-placeholder{width:110px;height:110px;border-radius:50%;border:1.5px solid rgba(120,90,60,0.25);background:#e8e0d5;display:flex;align-items:center;justify-content:center;margin-bottom:28px;font-size:36px;color:rgba(120,90,60,0.35);}
  .wi__label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:400;letter-spacing:.2em;color:rgba(100,75,50,0.6);text-transform:uppercase;margin-bottom:10px;}
  .wi__names{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,6vw,34px);font-weight:400;font-style:italic;color:#3d2b1a;line-height:1.25;margin-bottom:32px;}
  .wi__divider{display:flex;align-items:center;gap:12px;width:100%;margin-bottom:28px;}
  .wi__divider-line{flex:1;height:0.5px;background:rgba(120,90,60,0.25);}
  .wi__heart{color:rgba(120,90,60,0.5);font-size:18px;}
  .wi__body{font-family:'Montserrat',sans-serif;font-size:clamp(11px,2.5vw,13px);font-weight:400;letter-spacing:.12em;color:#5a4030;line-height:1.9;text-transform:uppercase;margin-bottom:0;}
  @media(max-width:480px){.wi__card{padding:40px 28px;}}
</style>
<div class="wi">
  <div class="wi__card">
    <svg class="wi__ornament" viewBox="0 0 280 50" fill="none" aria-hidden="true">

      <path d="M150 25 Q170 5 190 25 Q210 45 230 25 Q250 5 270 25" stroke="rgba(120,90,60,0.35)" stroke-width="1" fill="none"/>
      <circle cx="140" cy="25" r="5" stroke="rgba(120,90,60,0.4)" stroke-width="1" fill="none"/>

      <span class="wi__divider-line"></span>
